<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Necessidade - Conexão Voluntária</title>
    <!-- Vinculando o mesmo CSS unificado para manter a consistência visual -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Cabeçalho idêntico (Consistência Visual) com o link desta página ativo -->
    <header class="main-header">
        <div class="logo">
            <h1>Conexão <span>Voluntária</span></h1>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Home</a>
            <a href="cadastro.html" class="nav-link active">Cadastrar Necessidade</a>
            <a href="visualizacao.html" class="nav-link">Ver Necessidades</a>
        </nav>
    </header>

    <!-- Container Centralizado do Formulário -->
    <main class="container">
        <section class="form-section">
            <h2>Cadastrar Nova Demanda</h2>
            <p class="subtitle">Preencha as informações da sua instituição. Todos os campos são obrigatórios.</p>
            
            <!-- 
                Formulário estruturado. O atributo 'novalidate' foi adicionado para 
                desativar a validação padrão do navegador, pois faremos uma validação 
                muito mais profissional e customizada via JavaScript no próximo passo.
            -->
            <form id="formCadastro" class="volunter-form" novalidate>
                
                <!-- Nome da Instituição -->
                <div class="form-group">
                    <label for="nomeInstituicao">Nome da Instituição *</label>
                    <input type="text" id="nomeInstituicao" placeholder="Ex: ONG Mãos Amigas">
                </div>

                <!-- Tipo de Ajuda (Campo de Seleção / Select) -->
                <div class="form-group">
                    <label for="tipoAjuda">Tipo de Ajuda *</label>
                    <select id="tipoAjuda">
                        <option value="">Selecione uma opção...</option>
                        <option value="Educação">Educação</option>
                        <option value="Saúde">Saúde</option>
                        <option value="Meio Ambiente">Meio Ambiente</option>
