<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Necessidade - Conexão Voluntária</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Cabeçalho (Consistência Visual) -->
    <header class="main-header">
        <div class="logo">
            <h1>Conexão <span>Voluntária</span></h1>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Home</a>
            <a href="cadastro.html" class="nav-link active">Cadastrar Necessidade</a>
            <a href="visualizacao.html" class="nav-link">Ver Necessidades</a>
        </nav>
    </header>

    <!-- Container do Formulário -->
    <main class="container">
        <section class="form-container" style="max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <h2>Cadastrar Nova Demanda</h2>
            <p class="subtitle" style="margin-bottom: 20px; color: #666;">Preencha todos os dados abaixo.</p>
            
            <form id="formCadastro" novalidate style="display: flex; flex-direction: column; gap: 15px;">
                
                <!-- 1. Campo: Nome da Instituição -->
                <div class="form-group">
                    <label for="nomeInstituicao" style="display: block; font-weight: 600; margin-bottom: 5px;">Nome da Instituição *</label>
                    <input type="text" id="nomeInstituicao" name="nomeInstituicao" placeholder="Ex: Instituto Viva Voz" autocomplete="off" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                    <span class="error-message" id="erroNome" style="color: red; font-size: 0.85rem;"></span>
                </div>

                <!-- 2. Campo: Tipo de Ajuda (O campo novo entrou bem aqui!) -->
                <div class="form-group">
                    <label for="tipoAjuda" style="display: block; font-weight: 600; margin-bottom: 5px;">Tipo de Ajuda *</label>
                    <select id="tipoAjuda" name="tipoAjuda" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                        <option value="">Selecione uma opção...</option>
                        <option value="Educação">Educação</option>
                        <option value="Saúde">Saúde</option>
                        <option value="Meio Ambiente">Meio Ambiente</option>
                        <option value="Doação de Alimentos">Doação de Alimentos</option>
