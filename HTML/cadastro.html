<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Necessidade - Conexão Voluntária</title>
    <!-- CSS unificado que garante a identidade visual em todas as páginas -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Cabeçalho Padronizado -->
    <header class="main-header">
        <div class="logo">
            <h1>Conexão <span>Voluntária</span></h1>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Home</a>
            <a href="cadastro.html" class="nav-link active">Cadastrar Necessidade</a>
            <a href="visualizacao.html" class="nav-link">Ver Necessidades</a>
        </nav>
    </header>

    <!-- Container Principal Responsivo -->
    <main class="container" style="padding: 40px 20px;">
        <section class="form-container" style="max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <h2 style="margin-bottom: 5px; color: #34495e;">Cadastrar Nova Demanda</h2>
            <p class="subtitle" style="margin-bottom: 25px; color: #666; font-size: 0.95rem;">
                Preencha as informações abaixo para publicar a necessidade da sua instituição.
            </p>
            
            <!-- Formulário Estruturado -->
            <form id="formCadastro" novalidate style="display: flex; flex-direction: column; gap: 20px;">
                
                <!-- 1. Campo: Nome da Instituição -->
                <div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="nomeInstituicao" style="font-weight: 600; color: #333;">Nome da Instituição *</label>
                    <input type="text" id="nomeInstituicao" name="nomeInstituicao" placeholder="Ex: Instituto Viva Voz" autocomplete="off" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
                    <span class="error-message" id="erroNome" style="color: #e74c3c; font-size: 0.85rem;"></span>
                </div>

                <!-- 2. Campo: Tipo de Ajuda (Seleção) -->
                <div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="tipoAjuda" style="font-weight: 600; color: #333;">Tipo de Ajuda *</label>
                    <select id="tipoAjuda" name="tipoAjuda" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; background-color: #fff;">
                        <option value="">Selecione uma opção...</option>
                        <option value="Educação">Educação</option>
                        <option value="Saúde">Saúde</option>
                        <option value="Meio Ambiente">Meio Ambiente</option>
                        <option value="Doação de Alimentos">Doação de Alimentos</option>
                        <optionNormally
                        <!-- 3. Campo: Título da Necessidade -->
<div class="form-group">
    <label for="tituloNecessidade" style="display: block; font-weight: 600; margin-bottom: 5px;">Título da Necessidade *</label>
    <input 
        type="text" 
        id="tituloNecessidade" 
        name="tituloNecessidade" 
        placeholder="Ex: Ajuda com reforço escolar ou Coleta de lixo no parque" 
        style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;"
    >
    <span class="error-message" id="erroTitulo" style="color: red; font-size: 0.85rem;"></span>
</div>

<!-- 4. Campo: Descrição Detalhada -->
<div class="form-group">
    <label for="descricaoNecessidade" style="display: block; font-weight: 600; margin-bottom: 5px;">Descrição Detalhada *</label>
    <textarea 
        id="descricaoNecessidade" 
        name="descricaoNecessidade" 
        rows="4" 
        placeholder="Descreva detalhadamente o que a instituição precisa (ex: quantidade de voluntários, materiais específicos...)" 
        style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical;"
    ></textarea>
    <span class="error-message" id="erroDescricao" style="color: red; font-size: 0.85rem;"></span>
</div>

<!-- 6. Campo: Rua / Logradouro -->
<div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
    <label for="rua" style="font-weight: 600; color: #333;">Rua / Logradouro *</label>
    <input type="text" id="rua" name="rua" placeholder="Aguardando CEP..." style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
    <span class="error-message" id="erroRua" style="color: #e74c3c; font-size: 0.85rem;"></span>
</div>

<!-- 7. Campo: Bairro -->
<div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
    <label for="bairro" style="font-weight: 600; color: #333;">Bairro *</label>
    <input type="text" id="bairro" name="bairro" placeholder="Aguardando CEP..." style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
    <span class="error-message" id="erroBairro" style="color: #e74c3c; font-size: 0.85rem;"></span>
</div>

<!-- 8. Campo: Cidade -->
<div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
    <label for="cidade" style="font-weight: 600; color: #333;">Cidade *</label>
    <!-- O atributo 'readonly' impede a edição manual, pois a API preencherá com precisão -->
    <input type="text" id="cidade" name="cidade" placeholder="Aguardando CEP..." readonly style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; background-color: #f5f5f5; cursor: not-allowed;">
    <span class="error-message" id="erroCidade" style="color: #e74c3c; font-size: 0.85rem;"></span>
</div>

<!-- 9. Campo: Estado -->
<div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
    <label for="estado" style="font-weight: 600; color: #333;">Estado *</label>
    <input type="text" id="estado" name="estado" placeholder="Aguardando CEP..." readonly style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; background-color: #f5f5f5; cursor: not-allowed;">
    <span class="error-message" id="erroEstado" style="color: #e74c3c; font-size: 0.85rem;"></span>
</div>

<!-- 10. Campos de Contato -->
<div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
    <label for="emailContato" style="font-weight: 600; color: #333;">E-mail de Contato *</label>
    <input type="email" id="emailContato" name="emailContato" placeholder="exemplo@instituicao.org" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
    <span class="error-message" id="erroEmail" style="color: #e74c3c; font-size: 0.85rem;"></span>
</div>

<div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
    <label for="telefoneContato" style="font-weight: 600; color: #333;">Telefone de Contato *</label>
    <input type="tel" id="telefoneContato" name="telefoneContato" placeholder="(11) 99999-9999" maxlength="15" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
    <span class="error-message" id="erroTelefone" style="color: #e74c3c; font-size: 0.85rem;"></span>
</div>
